name: Validate repository

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate configuration and scripts
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate TOML and JSON
        shell: pwsh
        run: |
          $python = @'
          import json
          import pathlib
          import tomllib

          root = pathlib.Path('.')
          failures = []

          for path in root.rglob('*.toml'):
              try:
                  with path.open('rb') as handle:
                      tomllib.load(handle)
                  print(f'OK TOML: {path}')
              except Exception as exc:
                  failures.append(f'{path}: {exc}')

          for path in root.rglob('*.json'):
              try:
                  with path.open('r', encoding='utf-8') as handle:
                      json.load(handle)
                  print(f'OK JSON: {path}')
              except Exception as exc:
                  failures.append(f'{path}: {exc}')

          if failures:
              raise SystemExit('\n'.join(failures))
          '@

          $python | python -

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errorsFound = @()
          Get-ChildItem -Path . -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            ) | Out-Null

            if ($parseErrors.Count -gt 0) {
              $errorsFound += $parseErrors | ForEach-Object {
                "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)"
              }
            } else {
              Write-Host "OK PowerShell: $($_.FullName)"
            }
          }

          if ($errorsFound.Count -gt 0) {
            throw ($errorsFound -join [Environment]::NewLine)
          }

      - name: Check for conflict markers
        shell: pwsh
        run: |
          $matches = Get-ChildItem -Path . -Recurse -File |
            Where-Object { $_.FullName -notmatch '\\.git\\' } |
            Select-String -Pattern '^(<<<<<<<|=======|>>>>>>>)' -ErrorAction SilentlyContinue

          if ($matches) {
            $matches | ForEach-Object { Write-Error $_ }
            exit 1
          }
